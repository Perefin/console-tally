name: daily-scrape

on:
  schedule:
    - cron: "0 8 * * *"  # Every day 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape-daily
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run daily-cadence scrapers (soft-fail)
        continue-on-error: true
        run: |
          python -m scrapers.famitsu
          python -m scrapers.rss_watchers

      - name: Normalize + build SQLite
        run: python -m scrapers.normalize

      - name: Validate schema + canary
        run: pytest -q

      - name: Commit changes (if any)
        run: |
          git config user.name "console-tally-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ site/public/data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore(data): daily refresh $(date -u +%Y-%m-%d)"
            pushed=false
            for attempt in 1 2 3; do
              if git pull --rebase origin main && git push; then
                pushed=true
                break
              fi
              echo "push attempt $attempt failed; retrying"
              sleep 3
            done
            if [ "$pushed" != "true" ]; then
              echo "all push attempts failed" >&2
              exit 1
            fi
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi
        id: commit

      - name: Trigger Pages deploy
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-pages --ref main
