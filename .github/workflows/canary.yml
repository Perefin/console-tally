name: canary

on:
  schedule:
    - cron: "0 10 * * 1"  # Monday 10:00 UTC, after weekly refresh
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"

      - name: Regenerate + validate
        id: validate
        continue-on-error: true
        run: |
          python -m scrapers.normalize
          pytest tests/test_schema.py tests/test_canary.py -q

      - name: File an issue if validation failed
        if: steps.validate.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Canary failed on ${new Date().toISOString().slice(0,10)}`;
            const body = [
              'The weekly canary workflow found data-quality regressions.',
              '',
              'Check the latest run logs: https://github.com/${{ github.repository }}/actions',
              '',
              'Typical causes:',
              '- A source site redesigned and a scraper is now returning bad data',
              '- A manual PR introduced an out-of-bounds figure',
              '- Schema drifted',
              '',
              'Review `data/normalized/consoles.json` and the latest raw captures in `data/raw/`.',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['canary', 'data-quality'],
            });
