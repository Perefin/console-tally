name: deploy-pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "data/normalized/**"
      - "data/consoles.sqlite"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Mirror data into site/public/data (in case the normalizer wasn't rerun)
        run: |
          mkdir -p site/public/data
          cp -f data/normalized/consoles.json site/public/data/ || true
          cp -f data/normalized/regions.json site/public/data/ || true
          cp -f data/normalized/meta.json site/public/data/ || true
          cp -f data/consoles.sqlite site/public/data/ || true

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: site
        run: npm ci || npm install

      - name: Build
        working-directory: site
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
